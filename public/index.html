<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CallAPI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel hero">
        <div>
          <p class="eyebrow">CallAPI</p>
          <h1>English to Chinese</h1>
          <p class="intro">
            Paste English text on the left. Read the translated or summarized Chinese result on
            the right.
          </p>
        </div>
        <div class="hero-meta">
          <span class="meta-chip">Model: DeepSeek-V3.2</span>
          <span class="meta-chip">Local only</span>
          <span class="meta-chip">SiliconFlow</span>
        </div>
      </section>

      <section class="workspace">
        <section class="panel app-panel input-panel">
          <div class="panel-header">
            <div>
              <p class="section-kicker">Input</p>
              <h2>Source text</h2>
            </div>
            <button id="clearButton" class="secondary-button" type="button">Clear</button>
          </div>

          <div class="language-row">
            <div class="language-card">
              <span class="language-label">Source</span>
              <strong>English</strong>
            </div>
            <div class="language-arrow" aria-hidden="true">→</div>
            <div class="language-card">
              <label class="language-label" for="targetLanguage">Target</label>
              <input id="targetLanguage" type="text" value="Chinese" placeholder="Chinese" />
            </div>
          </div>

          <label class="field-label" for="sourceText">Paste content</label>
          <textarea
            id="sourceText"
            placeholder="Paste the English content you want to translate or summarize."
          ></textarea>

          <div class="actions">
            <button data-mode="translate">Translate</button>
            <button data-mode="summarize">Summarize</button>
            <button data-mode="translate-summarize">Both</button>
          </div>
        </section>

        <section class="panel app-panel result-panel">
          <div class="panel-header">
            <div>
              <p class="section-kicker">Output</p>
              <h2>Result</h2>
            </div>
            <button id="copyButton" class="secondary-button" type="button">Copy</button>
          </div>

          <div class="status-row">
            <p id="status">Ready.</p>
          </div>

          <div id="result" class="result-content">
            <div class="empty-state">
              <p>Run an action to see the result here.</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
